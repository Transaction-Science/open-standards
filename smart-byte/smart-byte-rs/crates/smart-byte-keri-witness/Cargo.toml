[package]
name = "smart-byte-keri-witness"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Smart Byte KERI key-event log: full inception/rotation/interaction/recovery/delegation cycle with witness layer, watchers, and OOBI bootstrap."

[dependencies]
smart-byte-core = { workspace = true }
