[package]
name = "smart-byte-vc"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "W3C Verifiable Credentials + DIDs + VC-JWT + SD-JWT + Status List ingestion for Smart Byte."

[dependencies]
smart-byte-core = { workspace = true }
serde = { workspace = true }
serde_json = "1"
serde_jcs = "0.1"
chrono = { workspace = true }
base64 = "0.22"
iref = { version = "3", features = ["serde"] }
multibase = "0.9"
ed25519-dalek = { workspace = true }
thiserror = { workspace = true }
rand = { workspace = true }
sha2 = "0.10"
flate2 = "1"
serde_cbor = { workspace = true }
blake3 = { workspace = true }

[features]
default = []
# Enable JSON-LD / RDF Dataset Canonicalization (URDNA2015) cryptosuites.
# Adds heavy dependencies; off by default. The JCS-cryptosuites are
# sufficient for v1.
rdf-canon = []

[dev-dependencies]
hex = "0.4"
