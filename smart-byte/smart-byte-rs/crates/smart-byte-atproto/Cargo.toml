[package]
name = "smart-byte-atproto"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "AT Protocol (Bluesky federation) adapter for Smart Byte: did:plc/did:web, Lexicon XRPC, CAR/IPLD, MST, signed repo commits, firehose, and AT URI ↔ AID bridge."

[dependencies]
smart-byte-core = { workspace = true }
smart-byte-did = { path = "../smart-byte-did" }
serde = { workspace = true }
serde_bytes = { workspace = true }
serde_json = "1"
serde_cbor = { workspace = true }
thiserror = { workspace = true }
blake3 = { workspace = true }
ed25519-dalek = { workspace = true }
data-encoding = { workspace = true }
sha2 = "0.10"
async-trait = "0.1"
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "io-util", "net", "time"] }
futures = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
url = "2"
chrono = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "io-util", "net", "time"] }
wiremock = "0.6"
hex = "0.4"
rand = { workspace = true }
