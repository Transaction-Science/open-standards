[package]
name = "smart-byte-did"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "W3C Decentralized Identifier (DID) resolution for Smart Byte. Implements did:key, did:web, did:peer, did:jwk and (feature-gated) did:ion."

[dependencies]
smart-byte-core = { workspace = true }
serde = { workspace = true }
serde_json = "1"
thiserror = { workspace = true }
ed25519-dalek = { workspace = true }
p256 = { version = "0.14.0-rc.9", default-features = false, features = ["arithmetic", "ecdsa", "alloc"] }
k256 = { version = "0.14.0-rc.9", default-features = false, features = ["arithmetic", "ecdsa", "alloc"] }
multibase = "0.9"
base64 = "0.22"
sha2 = "0.10"
async-trait = "0.1"
tokio = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
url = "2"

[dev-dependencies]
tokio = { workspace = true }
wiremock = "0.6"
hex = "0.4"
serde_json = "1"

[features]
default = []
# did:ion (Sidetree-based DID method). Real resolution requires an
# operator-side Sidetree node; this feature enables the parsing surface
# and a stub resolver.
ion = []
# BLS12-381 G2 key support for did:key.
bls12_381 = []
