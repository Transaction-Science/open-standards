[package]
name = "smart-byte-libp2p"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Smart Byte networking: libp2p transport for envelope publish/subscribe and SAID-keyed fetch."

[dependencies]
smart-byte-core = { workspace = true }
libp2p = { version = "0.56", default-features = false, features = [
    "tcp",
    "quic",
    "noise",
    "yamux",
    "kad",
    "gossipsub",
    "mdns",
    "autonat",
    "relay",
    "dcutr",
    "identify",
    "ping",
    "request-response",
    "tokio",
    "macros",
    "ed25519",
] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "io-util", "net", "time", "fs"] }
futures = { workspace = true }
serde = { workspace = true }
serde_cbor = { workspace = true }
async-trait = "0.1"
anyhow = { workspace = true }
tracing = "0.1"
thiserror = { workspace = true }
blake3 = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "sync", "io-util", "net", "time", "fs"] }
tempfile = "3"
tracing-subscriber = "0.3"
chrono = { workspace = true }
