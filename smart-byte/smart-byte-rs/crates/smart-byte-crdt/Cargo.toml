[package]
name = "smart-byte-crdt"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "Smart Byte CRDT engine: native CRDTs, HLC, vector clocks, CRDT documents, Automerge/Yjs interop, and a Smart Byte cargo bridge."

[dependencies]
smart-byte-core = { workspace = true }
serde = { workspace = true }
serde_cbor = { workspace = true }
serde_json = "1"
blake3 = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
thiserror = { workspace = true }
tracing = "0.1"
automerge = { version = "0.5", optional = true }
yrs = { version = "0.18", optional = true }

[dev-dependencies]
proptest = "1"

[features]
default = []
automerge-interop = ["dep:automerge"]
yjs-interop = ["dep:yrs"]

[lints.rust]
unsafe_code = "forbid"
