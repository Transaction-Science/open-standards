[package]
name = "smart-byte-edv"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Encrypted Data Vaults (DIF EDV v0.10) for Smart Byte. JWE ECDH-ES + A256GCM at rest, HMAC-over-value encrypted index, ZCAP-LD capability chains, and chunked stream encryption — a zero-knowledge storage substrate where the service operator cannot read plaintext."

[dependencies]
smart-byte-core = { workspace = true }
serde = { workspace = true }
serde_json = "1"
serde_bytes = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }
thiserror = { workspace = true }
rand = { workspace = true }
base64 = "0.22"
aes-gcm = { version = "0.10", features = ["alloc"] }
hkdf = "0.12"
hmac = "0.12"
sha2 = "0.10"
p256 = { version = "0.14.0-rc.9", default-features = false, features = ["arithmetic", "ecdh", "ecdsa", "alloc"] }
ed25519-dalek = { workspace = true }
async-trait = "0.1"
tokio = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
