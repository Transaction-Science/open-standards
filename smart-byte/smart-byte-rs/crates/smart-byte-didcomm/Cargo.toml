[package]
name = "smart-byte-didcomm"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "DIDComm v2 messaging for Smart Byte. Implements the DIF DIDComm Messaging v2.1 wire format (plaintext/signed/encrypted) plus the canonical Aries application protocols (issue-credential v3, present-proof v3, basic-message, trust-ping, discover-features, out-of-band, coordinate-mediation, messagepickup)."

[dependencies]
smart-byte-core = { workspace = true }
smart-byte-did = { path = "../smart-byte-did" }
smart-byte-vc = { path = "../smart-byte-vc" }
serde = { workspace = true }
serde_json = "1"
chacha20poly1305 = { version = "0.10", features = ["alloc"] }
ed25519-dalek = { workspace = true }
x25519-dalek = { version = "2", features = ["static_secrets"] }
p256 = { version = "0.14.0-rc.9", default-features = false, features = ["arithmetic", "ecdh", "ecdsa", "alloc"] }
sha2 = "0.10"
hkdf = "0.12"
base64 = "0.22"
chrono = { workspace = true }
uuid = { workspace = true }
thiserror = { workspace = true }
async-trait = "0.1"
tokio = { workspace = true }
rand = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
