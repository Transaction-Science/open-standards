# Project-wide Gradle settings.
#
# This module is a thin Kotlin wrapper around the Rust JNI library;
# it does not require Compose or other heavy tooling.

org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true

# AGP 9.0+ flags. Use AndroidX (Kotlin/Java enableJetifier removed).
android.useAndroidX=true

# Suppress non-final resources warning (we are a library, not an app).
android.nonTransitiveRClass=true

# Kotlin compiler defaults aligned with bundled KGP 2.2.x.
kotlin.code.style=official
