[package]
name = "op-webhook"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
description = "OpenPay outbound webhook delivery: HMAC-SHA256 signing, exponential-backoff retries with full jitter, dead-letter handling, replay, and pluggable HTTP transport."
publish = false

[dependencies]
op-core = { path = "../op-core" }

thiserror = { workspace = true }
serde = { workspace = true }
uuid = { workspace = true }
subtle = { workspace = true }
sha2 = "0.10"
hmac = "0.12"
tracing = { workspace = true }
reqwest = { workspace = true, optional = true }

[features]
default = []
reqwest-transport = ["dep:reqwest"]
