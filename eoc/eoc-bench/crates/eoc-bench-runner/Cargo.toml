[package]
name = "eoc-bench-runner"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Runner + aggregator for the EOC benchmark harness."

[features]
default = []
# Enable the path-based integration against the EOC reference implementation
# that lands with issue #7. When `eoc-rs` is present on disk, build with
# `--features eoc-rs` to wire the real cascade in.
eoc-rs = ["dep:eoc-core", "dep:eoc-cascade"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }

eoc-core = { workspace = true, optional = true }
eoc-cascade = { workspace = true, optional = true }
