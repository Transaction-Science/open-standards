[package]
name = "eoc-embeddings"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "EOC embedding-model backends — OpenAI v3, Cohere v3, Voyage, Mistral, Jina, and local ONNX (BGE/mxbai/nomic/GTE/E5)."

[dependencies]
eoc-core.workspace = true
async-trait.workspace = true
serde.workspace = true
serde_json = "1"
thiserror.workspace = true
blake3.workspace = true
lru.workspace = true
tokio = { version = "1", default-features = false, features = ["macros", "sync", "rt", "time"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json"] }
tracing = "0.1"

# Optional — local ONNX inference. Heavy; off by default. Linking ONNX
# Runtime requires either `ORT_LIB_PATH` to a system install, or enabling
# the `download-binaries` feature on `ort` downstream.
ort = { version = "2.0.0-rc.10", optional = true, default-features = false, features = ["std"] }
tokenizers = { version = "0.20", optional = true, default-features = false, features = ["onig"] }

[dev-dependencies]
tokio = { version = "1", default-features = false, features = ["macros", "rt-multi-thread", "test-util"] }
wiremock = "0.6"
insta = { version = "1", features = ["json"] }

[features]
default = []
local = ["dep:ort", "dep:tokenizers"]
