[package]
name = "eoc-vendor-api"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "EOC vendor LLM API backends — Anthropic, OpenAI, Google, Mistral, Cohere, Groq, Together, Fireworks."

[dependencies]
eoc-core.workspace = true
eoc-neural.workspace = true
async-trait.workspace = true
serde.workspace = true
serde_json = "1"
thiserror.workspace = true
tokio = { version = "1", default-features = false, features = ["macros", "sync", "rt", "time"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "stream"] }
futures-util = "0.3"
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", default-features = false, features = ["macros", "rt-multi-thread", "test-util"] }
wiremock = "0.6"
insta = { version = "1", features = ["json"] }
