[package]
name = "eoc-route-learned"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "EOC learned router — matrix-factorisation, classifier and bandit primitives that predict the best cascade stage from a query embedding."

[dependencies]
eoc-core.workspace = true
eoc-cascade.workspace = true
eoc-cache.workspace = true
serde.workspace = true
serde_json = "1"
async-trait.workspace = true
thiserror.workspace = true
rand = { version = "0.8", default-features = false, features = ["std", "std_rng"] }
rand_distr = { version = "0.4", default-features = false }
nalgebra = { version = "0.33", default-features = false, features = ["std", "serde-serialize"] }
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", default-features = false, features = ["macros", "rt-multi-thread", "test-util"] }
eoc-cache.workspace = true
eoc-kv.workspace = true
eoc-graph.workspace = true
eoc-neural.workspace = true
