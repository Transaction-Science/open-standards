[package]
name = "jouleclaw-schema"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Edge-First AI Architecture v6 schemas: QueryPlan, RetrievedItem, KnowledgeAxes, EpistemicMode, AtomicClaim, EntailmentResult, VerificationReport, Answer, RAP, SystemCapabilities, AnytimeResult, Invariants."

[dependencies]
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
uuid       = { version = "1", features = ["v4", "serde"] }
chrono     = { version = "0.4", features = ["serde"] }
