[package]
name = "jouleclaw-deberta"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "DeBERTa-v3 transformer family in Rust: safetensors loader, disentangled attention, NLI head. Backs the jouleclaw-diagnose entailment engine per edge-architecture spec §6.4."

[dependencies]
jouleclaw-schema     = { path = "../jouleclaw-schema" }
safetensors      = "0.6"
tokenizers       = { version = "0.22", default-features = false, features = ["onig"] }
serde            = { version = "1", features = ["derive"] }
serde_json       = "1"
chrono           = { version = "0.4", features = ["serde"] }
uuid             = { version = "1", features = ["v4", "serde"] }
half             = "2"
memmap2          = "0.9"
