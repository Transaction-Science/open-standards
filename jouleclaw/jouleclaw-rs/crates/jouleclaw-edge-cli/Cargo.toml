[package]
name = "jouleclaw-edge-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "End-to-end Edge-First AI CLI: wires Plan + Execute + Diagnose + Compose into a single binary that answers questions with full provenance."

[lib]
name = "jouleclaw_edge_cli"
path = "src/lib.rs"

[[bin]]
name = "jouleclaw-edge-cli"
path = "src/main.rs"

[dependencies]
jouleclaw-schema    = { path = "../jouleclaw-schema" }
jouleclaw-plan      = { path = "../jouleclaw-plan" }
jouleclaw-execute   = { path = "../jouleclaw-execute" }
jouleclaw-diagnose  = { path = "../jouleclaw-diagnose" }
jouleclaw-compose   = { path = "../jouleclaw-compose" }
jouleclaw-deberta   = { path = "../jouleclaw-deberta" }

tokio       = { version = "1", features = ["macros", "rt-multi-thread"] }
chrono      = { version = "0.4", features = ["serde"] }
uuid        = { version = "1", features = ["v4", "serde"] }
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"

[dev-dependencies]
tokio       = { version = "1", features = ["macros", "rt-multi-thread", "test-util"] }
