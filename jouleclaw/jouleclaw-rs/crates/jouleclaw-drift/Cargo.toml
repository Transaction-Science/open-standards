description = "Drift detection: Page-Hinkley (cumulative-change low-overhead detector) paired with DDSketch p99 tail-aware detector. The two-detector convention distinguishes systematic drift from heavy-tailed noise, the canonical failure mode of single-statistic drift alerts."

